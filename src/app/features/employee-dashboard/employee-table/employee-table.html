<table>
  <thead>
    <tr>
      <th>Employee ID</th>
      <th>Name</th>
      <th>Department</th>
      <th>Role</th>
      <th>Status</th>
    </tr>
  </thead>

  <tbody>
    
@for(employee of employees; track employee.id){
    <tr>

        <td> {{employee.id}}</td>
        <td> {{employee.firstName}} {{employee.lastName}}</td>
        <td> {{employee.department}}</td>
        <td> {{employee.role}}</td>
        <td> {{employee.status}}</td>

    </tr>
}

  </tbody>
</table>
